  <h2>Alunos</h2>
<div class="container">

  <table class="table table-striped table-bordered">
    <thead>
      <tr>
        <th>Nome</th>
        <th>Matrícula</th>
    </tr>
    </thead>
    <tbody>
      <tr *ngFor="let a of alunos">
      <td>{{a.nome}}</td>
      <td>{{a.id}}</td>
      </tr>
      
    </tbody>  
  </table>    
</div>
