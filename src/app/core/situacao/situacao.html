<div style="text-align: center;">
    <h1>Situação Escolar do Aluno</h1>
<form (ngSubmit)="buscarSituacao()">
  <input 
    type="text"
    [(ngModel)]="matriculaAluno"
    name="matricula"
    placeholder="Matrícula do aluno"
  />

  <button type="submit">Buscar</button>
</form>
 

<h2>{{nomeAluno}}</h2>
<table >
    <thead>
    
        <th>Materia</th>
    <th>Média</th>
    <th>Situação</th>
    </thead>
    <tbody >
        <tr *ngFor="let s of situacao">
    <td>{{s.materia}}</td>
    <td>{{s.media}}</td>
    <td>{{s.situacao}}</td>      
  </tr>
    </tbody>
</table>
 
</div>
